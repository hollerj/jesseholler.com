<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#FBFAF8;color:#111110;font-family:'Inter',sans-serif;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:64px 72px}
  .top{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.08em;text-transform:uppercase;color:#6B6960}
  .top .a{color:#2A6048}
  h1{font-size:200px;font-weight:800;line-height:.82;letter-spacing:-.05em;text-transform:uppercase}
  h1 .out{-webkit-text-stroke:5px #111110;color:transparent}
  .bot{display:flex;justify-content:space-between;align-items:flex-end}
  .bot .bio{font-size:26px;font-weight:700;letter-spacing:-.01em;max-width:560px;line-height:1.3}
  .bot .url{font-family:'JetBrains Mono',monospace;font-size:20px;color:#2A6048;letter-spacing:.04em}
  .rule{height:4px;background:#111110;margin:22px 0}
</style></head>
<body>
  <div class="top"><span>Strategy &amp; Product · <span class="a">Visa</span></span><span>San Francisco, CA</span></div>
  <h1>Jesse<br><span class="out">Holler</span></h1>
  <div>
    <div class="rule"></div>
    <div class="bot">
      <div class="bio">In Fintech. Always learning + building.</div>
      <div class="url">jesseholler.com</div>
    </div>
  </div>
</body></html>
